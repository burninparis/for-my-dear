<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 Марта, любимая! 🌸</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; text-align: center;
        }


        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 154, 158, 0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: 0.5s;
        }

        .start-btn {
            padding: 20px 40px; font-size: 1.5em; background: white;
            color: #d63384; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }


        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 400px; width: 90%;
            opacity: 0; transform: scale(0.8);
            transition: 1s ease-out;
        }

        .card.show { opacity: 1; transform: scale(1); }

        .slider-container {
            position: relative; width: 100%; height: 350px;
            overflow: hidden; background: #fff; border-radius: 15px; margin: 15px 0;
        }

        .slides { display: flex; height: 100%; transition: transform 0.6s ease-in-out; }

        .slide-item {
            min-width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .slide-item img {
            max-width: 90%; max-height: 75%;
            object-fit: contain; margin: auto; display: block;
        }

        .photo-caption { height: 15%; color: #d63384; font-style: italic; display: flex; align-items: center; justify-content: center; }

        .heart { color: #e74c3c; font-size: 40px; animation: beat 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        
        .petal { position: absolute; background: #ffc0cb; border-radius: 150% 0; opacity: 0.8; pointer-events: none; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }
    </style>
</head>
<body>


    <div id="overlay">
        <button class="start-btn" onclick="init()">Нажми сюда ❤️</button>
    </div>


    <div class="card" id="mainCard">
		<div id="timer-title" style="color: #666; font-size: 0.9em; margin-top: 10px;">Мы вместе уже:</div>
<div id="timer" style="color: #d63384; font-size: 1.2em; font-weight: bold; margin-bottom: 15px;">
    0 дней 00:00:00
</div>

        <div class="heart">❤️</div>
        <h1 style="color: #d63384;">С 8 Марта!</h1>

        <div class="slider-container">
            <div class="slides" id="slider">
                <div class="slide-item">
                    <img src="foto1.jpg">
                    <div class="photo-caption">Моей любимке!</div>
                </div>
                <div class="slide-item">
                    <img src="foto2.jpg">
                    <div class="photo-caption">Я тебя очень очень люблю!</div>
                </div>
                <div class="slide-item">
                    <img src="foto3.jpg">
                    <div class="photo-caption">Будь такой же красивой!</div>
                </div>
		<div class="slide-item">
                    <img src="foto4.jpg">
                    <div class="photo-caption">Желаю много деняг чтобы сидеть у тебя на шее</div>
                </div>
		<div class="slide-item">
                    <img src="foto5.jpg">
                    <div class="photo-caption">Ты моя красотка</div>
                </div>
		<div class="slide-item">
                    <img src="foto6.jpg">
                    <div class="photo-caption">Целую ╰(*°▽°*)╯</div>
                </div>






            </div>
        </div>

        
    </div>


    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        function init() {

            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').remove(), 500);


            document.getElementById('mainCard').classList.add('show');


            const audio = document.getElementById('bgMusic');
            audio.volume = 0.08; // Громкость 20%
            audio.play().catch(e => console.log("Браузер заблокировал звук:", e));


            setInterval(createPetal, 300);
            startSlider();
        }


        let step = 0;
        function startSlider() {
            const slider = document.getElementById('slider');
            const total = document.querySelectorAll('.slide-item').length;
            setInterval(() => {
                step = (step + 1) % total;
                slider.style.transform = `translateX(-${step * 100}%)`;
            }, 4000);
        }


        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = petal.style.height = Math.random() * 15 + 10 + 'px';
            petal.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 6000);
        }

const startDate = new Date(2025, 4, 25, 0, 0); // Пример: 15 июня 2023, 18:00

function updateTimer() {
    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const mins = Math.floor((diff / 1000 / 60) % 60);
    const secs = Math.floor((diff / 1000) % 60);


    const format = (num) => num < 10 ? '0' + num : num;

    document.getElementById('timer').innerHTML = 
        `${days} дней, ${format(hours)}:${format(mins)}:${format(secs)}`;
}


setInterval(updateTimer, 1000);
updateTimer(); 

    </script>
</body>
</html>
